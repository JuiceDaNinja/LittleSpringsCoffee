name: Update Instagram gallery

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: instagram-gallery-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Download latest public Instagram photos
        env:
          INSTAGRAM_USERNAME: "_littlespringscoffee_ma"
          INSTAGRAM_POST_LIMIT: "6"
        run: node scripts/update-instagram.mjs

      - name: Commit updated gallery
        run: |
          if git diff --quiet -- data/instagram-posts.json assets/instagram; then
            echo "Instagram gallery is already current."
            exit 0
          fi

          git config user.name "instagram-gallery-bot"
          git config user.email "instagram-gallery-bot@users.noreply.github.com"
          git add data/instagram-posts.json assets/instagram
          git commit -m "Update Instagram gallery"
          git push
